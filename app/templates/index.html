<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Closet | Organiza tu ropa de forma inteligente</title>
    <meta name="description" content="Gestiona y organiza tus prendas de vestir, controla qué ropa está limpia y qué necesita lavarse con un panel minimalista y fácil de usar.">
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Hojas de estilo Vanilla CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Fondo decorativo con gradientes orbitales fluidos -->
    <div class="glow-bg">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="app-container">
        <!-- HEADER PRINCIPAL -->
        <header class="app-header">
            <div class="logo-area">
                <span class="logo-dot"></span>
                <h1 id="app-title">Smart Closet</h1>
            </div>
            
            <!-- PANEL DE ESTADÍSTICAS -->
            <div class="stats-panel" id="stats-panel">
                <div class="stat-card" id="stat-total">
                    <span class="stat-num">0</span>
                    <span class="stat-label">Prendas</span>
                </div>
                <div class="stat-card" id="stat-clean">
                    <span class="stat-num text-success">0</span>
                    <span class="stat-label"><span class="indicator indicator-clean"></span> Limpias</span>
                </div>
                <div class="stat-card" id="stat-dirty">
                    <span class="stat-num text-danger">0</span>
                    <span class="stat-label"><span class="indicator indicator-dirty"></span> Sucias</span>
                </div>
            </div>

            <button class="btn btn-primary" id="btn-open-add-modal" aria-label="Agregar nueva prenda">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span>Nueva Prenda</span>
            </button>
        </header>

        <!-- BARRA DE HERRAMIENTAS (BÚSQUEDA Y FILTROS) -->
        <section class="toolbar">
            <div class="search-box">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search-input" placeholder="Buscar prenda..." aria-label="Buscar prendas por nombre">
            </div>

            <div class="filters-container">
                <div class="filter-group">
                    <span class="filter-label">Categoría</span>
                    <div class="filter-tabs" id="category-tabs">
                        <button class="tab active" data-category="all">Todas</button>
                        <button class="tab" data-category="Torso">Torso</button>
                        <button class="tab" data-category="Piernas">Piernas</button>
                        <button class="tab" data-category="Zapatos">Zapatos</button>
                        <button class="tab" data-category="Accesorios">Accesorios</button>
                        <button class="tab" data-category="Otros">Otros</button>
                    </div>
                </div>

                <div class="filter-group">
                    <span class="filter-label">Estado</span>
                    <div class="filter-tabs" id="status-tabs">
                        <button class="tab active" data-status="all">Todos</button>
                        <button class="tab" data-status="Limpio">Limpias</button>
                        <button class="tab" data-status="Sucio">Sucias</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- REJILLA DE PRENDAS -->
        <main class="content-area">
            <div class="closet-grid" id="closet-grid">
                <!-- Las tarjetas de prendas se cargarán aquí de forma dinámica -->
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Cargando tu clóset...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL DE FORMULARIO (AGREGAR / EDITAR PRENDA) -->
    <div class="modal-overlay" id="clothing-modal">
        <div class="modal-card">
            <header class="modal-header">
                <h2 id="modal-title">Agregar Nueva Prenda</h2>
                <button class="btn-close" id="btn-close-modal" aria-label="Cerrar modal">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </header>

            <form id="clothing-form" class="modal-body">
                <input type="hidden" id="form-item-id">
                
                <div class="form-grid">
                    <!-- Sección de Subida de Imagen -->
                    <div class="form-group image-upload-group">
                        <label>Foto de la Prenda</label>
                        <div class="image-dropzone" id="image-dropzone">
                            <input type="file" id="image-input" accept="image/*" class="hidden-file-input">
                            <div class="dropzone-content" id="dropzone-content">
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="17 8 12 3 7 8"></polyline>
                                    <line x1="12" y1="3" x2="12" y2="15"></line>
                                </svg>
                                <p>Sube o arrastra una imagen</p>
                                <span class="dropzone-sub">PNG, JPG de tamaño moderado</span>
                            </div>
                            <img id="image-preview" class="image-preview hidden" src="" alt="Vista previa de la prenda">
                            <button type="button" class="btn-remove-image hidden" id="btn-remove-image">Eliminar Foto</button>
                        </div>
                    </div>

                    <!-- Campos del Formulario -->
                    <div class="form-fields">
                        <div class="form-group">
                            <label for="name-input">Nombre de la Prenda</label>
                            <input type="text" id="name-input" required placeholder="Ej. Camiseta negra básica" aria-required="true">
                        </div>

                        <div class="form-group">
                            <label for="category-input">Categoría</label>
                            <select id="category-input" required aria-required="true">
                                <option value="" disabled selected>Selecciona una categoría</option>
                                <option value="Torso">Torso (Camisetas, camisas, buzos)</option>
                                <option value="Piernas">Piernas (Pantalones, shorts, faldas)</option>
                                <option value="Zapatos">Zapatos (Tenis, botas, sandalias)</option>
                                <option value="Accesorios">Accesorios (Gorra, correa, bufanda)</option>
                                <option value="Otros">Otros (Prendas diversas)</option>
                            </select>
                        </div>

                        <div class="form-row-2">
                            <div class="form-group">
                                <label for="status-input">Estado de Limpieza</label>
                                <select id="status-input" required aria-required="true">
                                    <option value="Limpio">Limpio</option>
                                    <option value="Sucio">Sucio</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="color-input">Color Clave</label>
                                <div class="color-picker-wrapper">
                                    <input type="color" id="color-input" value="#6366f1">
                                    <span class="color-hex-val" id="color-hex-val">#6366f1</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <footer class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="btn-cancel-modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="btn-submit-form">Guardar Prenda</button>
                </footer>
            </form>
        </div>
    </div>

    <!-- TOAST DE NOTIFICACIONES -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Lógica Frontend -->
    <script src="/static/js/app.js"></script>
</body>
</html>
